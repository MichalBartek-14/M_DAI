# Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: sentinel-dashboard-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SENTINELHUB_CLIENT_ID
        sync: false   # Set via Render dashboard
      - key: SENTINELHUB_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://sentinel-dashboard.vercel.app"]'
      - key: TILE_CACHE_DIR
        value: /tmp/sentinel_tile_cache
    healthCheckPath: /api/health
    autoDeploy: true
