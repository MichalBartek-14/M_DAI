version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SENTINELHUB_CLIENT_ID=${SENTINELHUB_CLIENT_ID:-}
      - SENTINELHUB_CLIENT_SECRET=${SENTINELHUB_CLIENT_SECRET:-}
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      - TILE_CACHE_DIR=/tmp/sentinel_tile_cache
    volumes:
      - tile_cache:/tmp/sentinel_tile_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  tile_cache:
